<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Картка вогню - Азимутна сітка 1-4 км</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2c3e2f;
            padding: 20px;
            padding-bottom: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', monospace;
        }
        .control-panel {
            background: #1e2a1c;
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1000px;
        }
        .coord-group { flex: 2; min-width: 280px; }
        .name-group { flex: 1; min-width: 200px; }
        .zones-panel {
            background: #1e2a1c;
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 1000px;
        }
        .zones-panel label { color: #f0e6c5; font-size: 12px; font-weight: bold; display: block; margin-bottom: 8px; }
        .zone-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
        .zone-row input {
            width: 110px; background: #fff0f0; border: 2px solid #c0392b;
            padding: 7px 10px; font-family: monospace; font-size: 13px; font-weight: bold;
            border-radius: 6px; color: #c0392b;
        }
        .zone-row span { color: #f0e6c5; font-size: 13px; }
        .zone-remove { background: #c0392b; color: #fff; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .zone-remove:hover { background: #e74c3c; }
        .add-zone-btn { background: #c0392b; color: #fff; border: none; padding: 7px 16px; border-radius: 7px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 4px; }
        .add-zone-btn:hover { background: #e74c3c; }
        .orientirs-panel {
            background: #1e2a1c;
            padding: 12px 25px;
            border-radius: 12px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 1000px;
        }
        .orientirs-panel > label { color: #f0e6c5; font-size: 12px; font-weight: bold; display: block; margin-bottom: 8px; }
        .or-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
        .or-row .or-label { color: #f0e6c5; font-size: 13px; font-weight: bold; min-width: 38px; }
        .or-row input {
            flex: 1; background: #e8f5e9; border: 2px solid #27ae60;
            padding: 7px 10px; font-family: monospace; font-size: 13px; font-weight: bold;
            border-radius: 6px; color: #1a5c33;
        }
        .or-remove { background: #27ae60; color: #fff; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .or-remove:hover { background: #2ecc71; }
        .add-or-btn { background: #27ae60; color: #fff; border: none; padding: 7px 16px; border-radius: 7px; font-weight: bold; cursor: pointer; font-size: 13px; margin-top: 4px; }
        .add-or-btn:hover { background: #2ecc71; }
        .coord-group label { display: block; color: #f0e6c5; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .coord-group input {
            width: 100%; background: #fef9e6; border: 2px solid #c4a747;
            padding: 10px 14px; font-family: monospace; font-size: 14px; font-weight: bold; border-radius: 8px;
        }
        button {
            background: #c4a747; border: none; padding: 10px 24px;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        button:hover { background: #dbb85c; }
        .pdf-btn { background: #8b5a2b; color: white; }
        .coord-status {
            background: #e8e0c5; padding: 8px 20px; font-family: monospace;
            font-size: 13px; border-radius: 10px; margin-bottom: 15px;
            width: 100%; max-width: 1000px; text-align: center;
        }
        .map-container {
            position: relative; height: 550px; width: 100%;
            max-width: 1000px; background: #cdd5c2;
            border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #map { height: 100%; width: 100%; }
        #statusMsg {
            margin-top: 10px; color: #f0e6c5; font-size: 13px;
            min-height: 22px; text-align: center; width: 100%; max-width: 1000px;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <div class="coord-group">
            <label>🎯 КООРДИНАТИ ЦЕНТРУ (широта, довгота):</label>
            <input type="text" id="coordInput" value="" placeholder="Приклад: 50.136125, 36.123321">
        </div>
        <div class="name-group">
            <label style="display:block;color:#f0e6c5;font-size:12px;font-weight:bold;margin-bottom:5px;">📌 НАЗВА ПОЗИЦІЇ:</label>
            <input type="text" id="nameInput" value="" placeholder="Наприклад: ЗВП-1" style="width:100%;background:#fef9e6;border:2px solid #c4a747;padding:10px 14px;font-family:monospace;font-size:14px;font-weight:bold;border-radius:8px;">
        </div>
    </div>
    <div class="orientirs-panel">
        <label>🟢 ОРІЄНТИРИ (координати точки):</label>
        <div id="orientirsList">
            <div class="or-row">
                <span class="or-label">Ор.1</span>
                <input type="text" class="or-input" placeholder="50.136125, 36.123321">
            </div>
        </div>
        <button class="add-or-btn" id="addOrBtn">+ Додати орієнтир</button>
    </div>
    <div class="zones-panel">
        <label>🔴 ЧЕРВОНІ ЗОНИ (діапазон градусів від-до, наприклад: 0-30):</label>
        <div id="zonesList">
            <div class="zone-row">
                <input type="text" class="zone-input" placeholder="0-30">
                <span>градусів</span>
            </div>
        </div>
        <button class="add-zone-btn" id="addZoneBtn">+ Додати зону</button>
    </div>
    <div style="position:fixed;bottom:0;left:0;right:0;display:flex;gap:0;z-index:9999;box-shadow:0 -3px 12px rgba(0,0,0,0.4);">
        <button id="applyBtn" style="flex:1;font-size:15px;padding:15px 0;border-radius:0;background:#c4a747;font-weight:bold;border:none;cursor:pointer;">🏹 ПОБУДУВАТИ АЗИМУТНУ СІТКУ</button>
        <button id="pdfBtn" class="pdf-btn" style="flex:1;font-size:15px;padding:15px 0;border-radius:0;background:#8b5a2b;color:white;font-weight:bold;border:none;cursor:pointer;">📄 ЗБЕРЕГТИ PDF</button>
    </div>
    <div class="coord-status">
        <span>📍 Центр: <strong id="coordStatus">—</strong></span>
        <span style="margin-left: 25px;">━━━ Кола: 1, 2, 3, 4 км &nbsp;|&nbsp; ─── Радіальні лінії через 3°</span>
    </div>
    <div class="map-container">
        <div id="map"></div>
    </div>
    <div id="statusMsg"></div>

<script>
let mainMap, mainOverlay = null, currentCenter = null;

function setStatus(msg) { document.getElementById('statusMsg').textContent = msg; }

function parseCoords(str) {
    // Нормалізуємо формат: 50,1091235, 36,0852673 → 50.1091235, 36.0852673
    // Замінюємо кому між цифрами (десятковий роздільник) на крапку
    let s = str.trim().replace(/(\d),(\d)/g, '$1.$2');
    let parts = s.split(/[\s,;]+/).filter(p => p.length > 0);
    let lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng)) return null;
    return { lat, lng };
}

function getPoint(lat, lng, az, meters) {
    let d = turf.destination(turf.point([lng, lat]), meters / 1000, az, { units: 'kilometers' });
    return { lat: d.geometry.coordinates[1], lng: d.geometry.coordinates[0] };
}

function getRedZones() {
    const zones = [];
    document.querySelectorAll('.zone-input').forEach(inp => {
        const val = inp.value.trim();
        if (!val) return;
        const parts = val.split(/[-–—]/);
        if (parts.length < 2) return;
        const from = parseFloat(parts[0]), to = parseFloat(parts[1]);
        if (!isNaN(from) && !isNaN(to)) zones.push({ from, to });
    });
    return zones;
}

document.getElementById('addZoneBtn').addEventListener('click', () => {
    const row = document.createElement('div');
    row.className = 'zone-row';
    row.innerHTML = `<input type="text" class="zone-input" placeholder="0-30"><span>градусів</span><button class="zone-remove">✕</button>`;
    row.querySelector('.zone-remove').addEventListener('click', () => row.remove());
    document.getElementById('zonesList').appendChild(row);
});

function getOrientirs() {
    const list = [];
    document.querySelectorAll('.or-input').forEach((inp, i) => {
        const val = inp.value.trim().replace(/(\d),(\d)/g, '$1.$2');
        if (!val) return;
        const coords = parseCoords(val);
        if (coords) list.push({ num: i + 1, lat: coords.lat, lng: coords.lng });
    });
    return list;
}

document.getElementById('addOrBtn').addEventListener('click', () => {
    const rows = document.querySelectorAll('.or-row');
    const num = rows.length + 1;
    const row = document.createElement('div');
    row.className = 'or-row';
    row.innerHTML = `<span class="or-label">Ор.${num}</span><input type="text" class="or-input" placeholder="50.136125, 36.123321"><button class="or-remove">✕</button>`;
    row.querySelector('.or-remove').addEventListener('click', () => {
        row.remove();
        // Перенумеровуємо
        document.querySelectorAll('.or-row .or-label').forEach((lbl, i) => { lbl.textContent = `Ор.${i + 1}`; });
    });
    document.getElementById('orientirsList').appendChild(row);
});

function drawGrid(mapInstance, oldLayer, lat, lng, posName, redZones, orientirs) {
    if (oldLayer) mapInstance.removeLayer(oldLayer);
    const g = L.layerGroup();
    const N = 180, R = 4000;

    // ── Червоні зони (штрихування) ──
    if (redZones && redZones.length > 0) {
        redZones.forEach(({ from, to }) => {
            // Малюємо лінії штрихування через кожні 5° в секторі
            const step = 5;
            let a = from;
            while (a <= to) {
                const e = getPoint(lat, lng, a, R);
                L.polyline([[lat, lng], [e.lat, e.lng]], {
                    color: '#e00', weight: 1.2, opacity: 0.55
                }).addTo(g);
                a += step;
            }
            // Межові лінії сектору — товсті червоні
            const ef = getPoint(lat, lng, from, R);
            const et = getPoint(lat, lng, to, R);
            L.polyline([[lat, lng], [ef.lat, ef.lng]], { color: '#c00', weight: 2, opacity: 0.9 }).addTo(g);
            L.polyline([[lat, lng], [et.lat, et.lng]], { color: '#c00', weight: 2, opacity: 0.9 }).addTo(g);
            // Дуга по зовнішньому колу сектору
            const arcPts = [];
            for (let i = from; i <= to; i += 2) {
                const p = getPoint(lat, lng, i, R);
                arcPts.push([p.lat, p.lng]);
            }
            const pTo = getPoint(lat, lng, to, R);
            arcPts.push([pTo.lat, pTo.lng]);
            L.polyline(arcPts, { color: '#c00', weight: 2, opacity: 0.9 }).addTo(g);
        });
    }
    const oc = [];
    for (let i = 0; i <= N; i++) { const p = getPoint(lat, lng, i * 360 / N, R); oc.push([p.lat, p.lng]); }
    L.polyline(oc, { color: '#000', weight: 2.5, dashArray: '8,6' }).addTo(g);

    [1000, 2000, 3000].forEach(r => {
        const c = [];
        for (let i = 0; i <= N; i++) { const p = getPoint(lat, lng, i * 360 / N, r); c.push([p.lat, p.lng]); }
        L.polyline(c, { color: '#000', weight: r === 2000 ? 3.5 : 1.5 }).addTo(g);
    });

    for (let az = 0; az < 360; az += 3) {
        if (az % 30 === 0) continue;
        const e = getPoint(lat, lng, az, R);
        L.polyline([[lat, lng], [e.lat, e.lng]], { color: '#333', weight: 0.7, opacity: 0.6 }).addTo(g);
    }

    [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330].forEach(az => {
        const e = getPoint(lat, lng, az, R);
        L.polyline([[lat, lng], [e.lat, e.lng]], { color: '#000', weight: az % 90 === 0 ? 2.5 : 1.5 }).addTo(g);
    });

    [{ az: 0, deg: '0°', mil: '00-00', num: '1' }, { az: 30, deg: '30°', mil: '05-00' },
     { az: 60, deg: '60°', mil: '10-00' }, { az: 90, deg: '90°', mil: '15-00', num: '4' },
     { az: 120, deg: '120°', mil: '20-00' }, { az: 150, deg: '150°', mil: '25-00' },
     { az: 180, deg: '180°', mil: '30-00', num: '3' }, { az: 210, deg: '210°', mil: '35-00' },
     { az: 240, deg: '240°', mil: '40-00' }, { az: 270, deg: '270°', mil: '45-00', num: '2' },
     { az: 300, deg: '300°', mil: '50-00' }, { az: 330, deg: '330°', mil: '55-00' }
    ].forEach(({ az, deg, mil, num }) => {
        const lp = getPoint(lat, lng, az, R + 200), ic = az % 90 === 0;
        L.marker([lp.lat, lp.lng], {
            interactive: false, icon: L.divIcon({
                className: '',
                html: `<div style="font-family:Arial,sans-serif;text-align:center;font-weight:bold;font-size:10px;line-height:1.3;color:#000;white-space:nowrap"><u style="font-size:11px">${deg}</u><br><u>${mil}</u>${ic && num ? `<br><span style="font-size:14px">${num}</span>` : ''}</div>`,
                iconSize: [60, ic ? 54 : 38], iconAnchor: [30, ic ? 27 : 19]
            })
        }).addTo(g);
    });

    [{ az: 45, n: '14' }, { az: 135, n: '34' }, { az: 225, n: '32' }, { az: 315, n: '12' }].forEach(({ az, n }) => {
        const lp = getPoint(lat, lng, az, 2600);
        L.marker([lp.lat, lp.lng], {
            interactive: false, icon: L.divIcon({
                className: '',
                html: `<b style="font-family:Arial,sans-serif;font-size:22px;color:#000">${n}</b>`,
                iconSize: [40, 30], iconAnchor: [20, 15]
            })
        }).addTo(g);
    });

    // Символ центру — іконка ЗРК з іконки
    const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="44" viewBox="0 0 36 44">
      <!-- Блакитне коло-фон -->
      <circle cx="18" cy="18" r="15" fill="#87DCEF"/>
      <!-- Пунктирне обведення кола -->
      <circle cx="18" cy="18" r="16.5" fill="none" stroke="#1a2535" stroke-width="2.5" stroke-dasharray="4.5,3"/>
      <!-- Вертикальна лінія вгору -->
      <line x1="18" y1="27" x2="18" y2="7" stroke="#1a2535" stroke-width="2" stroke-linecap="round"/>
      <!-- Стрілка вгору -->
      <line x1="12" y1="13" x2="18" y2="6" stroke="#1a2535" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="13" x2="18" y2="6" stroke="#1a2535" stroke-width="2" stroke-linecap="round"/>
      <!-- Перекладина 1 -->
      <line x1="10" y1="19" x2="26" y2="19" stroke="#1a2535" stroke-width="2" stroke-linecap="round"/>
      <!-- Перекладина 2 -->
      <line x1="10" y1="25" x2="26" y2="25" stroke="#1a2535" stroke-width="2" stroke-linecap="round"/>
      <!-- Платформа -->
      <line x1="4" y1="33" x2="32" y2="33" stroke="#666" stroke-width="3" stroke-linecap="round"/>
      <!-- Колесо ліве -->
      <circle cx="8"  cy="38" r="4" fill="none" stroke="#666" stroke-width="2"/>
      <circle cx="8"  cy="38" r="1.5" fill="#666"/>
      <!-- Колесо праве -->
      <circle cx="28" cy="38" r="4" fill="none" stroke="#666" stroke-width="2"/>
      <circle cx="28" cy="38" r="1.5" fill="#666"/>
    </svg>`;
    L.marker([lat, lng], {
        interactive: false, icon: L.divIcon({
            className: '',
            html: svgIcon,
            iconSize: [36, 44], iconAnchor: [18, 33]
        })
    }).addTo(g);

    // Назва позиції під центром
    if (posName && posName.trim()) {
        const namePoint = getPoint(lat, lng, 180, 280);
        L.marker([namePoint.lat, namePoint.lng], {
            interactive: false, icon: L.divIcon({
                className: '',
                html: `<div style="font-family:Arial,sans-serif;font-size:13px;font-weight:bold;color:#000;white-space:nowrap;text-align:center;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;">${posName}</div>`,
                iconSize: [120, 20], iconAnchor: [60, 0]
            })
        }).addTo(g);
    }

    // Орієнтири
    if (orientirs && orientirs.length > 0) {
        orientirs.forEach(({ num, lat: oLat, lng: oLng }) => {
            // Відстань від центру до орієнтиру в гм (1 гм = 100м)
            const distM = turf.distance(turf.point([lng, lat]), turf.point([oLng, oLat]), { units: 'kilometers' }) * 1000;
            const distGm = (distM / 100).toFixed(1);
            L.marker([oLat, oLng], {
                interactive: false, icon: L.divIcon({
                    className: '',
                    html: `<div style="font-family:Arial,sans-serif;font-size:11px;font-weight:bold;color:#1a5c33;white-space:nowrap;text-align:center;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;">
                        <div style="font-size:15px;">▲</div>
                        <div style="border-bottom:1.5px solid #1a5c33;padding-bottom:1px;">Ор.${num}</div>
                        <div>${distGm}</div>
                    </div>`,
                    iconSize: [50, 50], iconAnchor: [25, 38]
                })
            }).addTo(g);
        });
    }

    g.addTo(mapInstance);
    return g;
}

function initMap() {
    mainMap = L.map('map', { preferCanvas: true }).setView([48.5, 31.0], 6);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: 'OpenTopoMap', maxZoom: 18 }).addTo(mainMap);
}

function updateGrid() {
    const coords = parseCoords(document.getElementById('coordInput').value);
    if (!coords) { alert('Помилка! Введіть координати у форматі: 50.136125, 36.123321'); return false; }
    currentCenter = coords;
    const posName = document.getElementById('nameInput').value.trim();
    const redZones = getRedZones();
    const orientirs = getOrientirs();
    mainMap.setView([coords.lat, coords.lng], 12);
    mainOverlay = drawGrid(mainMap, mainOverlay, coords.lat, coords.lng, posName, redZones, orientirs);
    document.getElementById('coordStatus').innerHTML = `${coords.lat.toFixed(6)}, ${coords.lng.toFixed(6)}`;
    return true;
}

const mercY = lat => Math.log(Math.tan((90 + lat) * Math.PI / 360));

function ll2tile(lat, lng, z) {
    const n = 2 ** z;
    return { x: Math.floor((lng + 180) / 360 * n), y: Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * n) };
}
function tile2ll(x, y, z) {
    const n = 2 ** z;
    return { lat: Math.atan(Math.sinh(Math.PI * (1 - 2 * y / n))) * 180 / Math.PI, lng: x / n * 360 - 180 };
}
async function fetchTile(url) {
    try {
        const r = await fetch(url, { mode: 'cors', signal: AbortSignal.timeout(8000) });
        if (!r.ok) return null;
        const blob = await r.blob();
        return new Promise(res => { const fr = new FileReader(); fr.onload = () => res(fr.result); fr.onerror = () => res(null); fr.readAsDataURL(blob); });
    } catch { return null; }
}

async function exportPDF() {
    if (!currentCenter) { alert('Спочатку введіть координати та натисніть «ПОБУДУВАТИ АЗИМУТНУ СІТКУ»'); return; }
    const btn = document.getElementById('pdfBtn');
    btn.innerText = '⏳ Генерація PDF...'; btn.disabled = true;
    setStatus('⏳ Завантаження тайлів карти...');

    try {
        const { lat, lng } = currentCenter;
        const zoom = 12;

        const edgeM = 4700;
        const dLat = edgeM / 110540;
        const dLng = edgeM / (111320 * Math.cos(lat * Math.PI / 180));
        const MN = lat + dLat, MS = lat - dLat, MW = lng - dLng, ME = lng + dLng;

        const nwT = ll2tile(MN, MW, zoom), seT = ll2tile(MS, ME, zoom);
        const TILE = 256;
        const jobs = [];
        for (let tx = nwT.x; tx <= seT.x; tx++)
            for (let ty = nwT.y; ty <= seT.y; ty++) {
                const sub = ['a', 'b', 'c'][Math.abs(tx + ty) % 3];
                jobs.push(fetchTile(`https://${sub}.tile.opentopomap.org/${zoom}/${tx}/${ty}.png`).then(b => ({ tx, ty, b })));
            }
        const tiles = await Promise.all(jobs);

        const txs = seT.x - nwT.x + 1, tys = seT.y - nwT.y + 1;
        const fc = document.createElement('canvas'); fc.width = txs * TILE; fc.height = tys * TILE;
        const fctx = fc.getContext('2d'); fctx.fillStyle = '#d8d8c0'; fctx.fillRect(0, 0, fc.width, fc.height);
        await Promise.all(tiles.map(({ tx, ty, b }) => new Promise(res => {
            if (!b) { res(); return; }
            const img = new Image();

        clx.font = `${2 * SC}px Arial`; clx.textAlign = 'center';
        clx.fillText(`Центр: ${lat.toFixed(6)}, ${lng.toFixed(6)}  |  ${new Date().toLocaleDateString('uk-UA')}`, fW / 2, 3.5 * SC);
        pdf.addImage(clc.toDataURL('image/png'), 'PNG', M, PH - 6, PW - M * 2, 5);

        pdf.save(`Kartka_vognyu_${lat.toFixed(5)}_${lng.toFixed(5)}.pdf`);
        setStatus('✅ PDF збережено успішно!');
        setTimeout(() => setStatus(''), 4000);

    } catch (e) {
        console.error(e); setStatus('❌ Помилка: ' + e.message); alert('Помилка: ' + e.message);
    } finally {
        btn.innerText = '📄 ЗБЕРЕГТИ PDF'; btn.disabled = false;
    }
}

window.addEventListener('resize', () => { if (mainMap) setTimeout(() => mainMap.invalidateSize(), 150); });

document.getElementById('coordInput').addEventListener('blur', function() {
    this.value = this.value.replace(/(\d),(\d)/g, '$1.$2');
});

// Автовиправлення коми в полях орієнтирів при втраті фокусу
document.getElementById('orientirsList').addEventListener('blur', function(e) {
    if (e.target.classList.contains('or-input')) {
        e.target.value = e.target.value.replace(/(\d),(\d)/g, '$1.$2');
    }
}, true);
document.getElementById('applyBtn').addEventListener('click', updateGrid);
document.getElementById('pdfBtn').addEventListener('click', exportPDF);
initMap();
</script>
